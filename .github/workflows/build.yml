name: Build Anthropic news feed

on:
  schedule:
    - cron: "0 * * * *"        # hourly (best-effort; GitHub may delay)
  workflow_dispatch: {}         # manual trigger
  push:
    branches: [main]
    paths:
      - build_feed.py
      - requirements.txt
      - .github/workflows/build.yml

# Serialize runs so state commits + Pages deploys don't overlap.
concurrency:
  group: build-feed
  cancel-in-progress: false

permissions:
  contents: write   # commit feed_state.json + public/
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages

env:
  # Set to your Pages URL, e.g. https://<user>.github.io/<repo>/ (trailing slash).
  FEED_PAGE_URL: https://elmertucker.github.io/claude-watcher/

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.pages.outputs.base_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build feed
        run: python build_feed.py

      - name: Commit updated state and feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed_state.json public
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: update feed $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
